name: Show Service Account Email

on:
  workflow_dispatch:

jobs:
  show-email:
    runs-on: ubuntu-latest

    steps:
      - name: Write service account key
        run: echo '${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}' > gsc-key.json

      - name: Extract and Display Service Account Email
        run: |
          echo "================================================================================"
          echo "SERVICE ACCOUNT EMAIL"
          echo "================================================================================"
          echo ""
          SERVICE_EMAIL=$(cat gsc-key.json | grep -o '"client_email"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/"client_email"[[:space:]]*:[[:space:]]*"\([^"]*\)"/\1/')
          echo "  $SERVICE_EMAIL"
          echo ""
          echo "================================================================================"
          echo "NEXT STEPS"
          echo "================================================================================"
          echo ""
          echo "1. Copy the email address above"
          echo ""
          echo "2. Open your Google Sheet:"
          echo "   https://docs.google.com/spreadsheets/d/19ucIx6nVlEx6pnHyKo8ahJ158tJmo4cxAwLARNWIJZw/edit"
          echo ""
          echo "3. Click 'Share' button (top right)"
          echo ""
          echo "4. Add the service account email"
          echo ""
          echo "5. Set permission to 'Editor'"
          echo ""
          echo "6. Uncheck 'Notify people'"
          echo ""
          echo "7. Click 'Share'"
          echo ""
          echo "8. Test the connection:"
          echo "   gh workflow run 'Test Google Sheets Connection'"
          echo ""
          echo "================================================================================"

      - name: Clean up
        if: always()
        run: rm -f gsc-key.json
