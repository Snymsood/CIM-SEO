name: Content Audit Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 1 * *"

jobs:
  content-audit-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}' > gsc-key.json

      - name: Run content audit schedule
        env:
          GSC_PROPERTY: "https://www.cim.org/"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_ITEM_ID: "11818936551"
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python -u content_audit_schedule_report.py

      - name: Upload content audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: content-audit-schedule
          path: |
            content_audit_config.csv
            content_audit_page_comparison.csv
            content_audit_candidates.csv
            content_audit_selection.csv
            content_audit_top_candidates.png
            content_audit_candidate_impressions.png
            content_audit_candidate_clicks.png
            content_audit_selected_score.png
            content_audit_schedule_summary.md
            content_audit_schedule_summary.html
            content_audit_schedule_summary_final.html
