name: GSC Weekly Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday at 13:00 UTC

jobs:
  gsc-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}' > gsc-key.json

      - name: Run GSC report
        env:
          GSC_PROPERTY: "https://www.cim.org/"
        run: python gsc_weekly_report.py

      - name: Upload report files
        uses: actions/upload-artifact@v4
        with:
          name: gsc-weekly-report
          path: |
            weekly_gsc_report.csv
            weekly_comparison.csv
            top_queries.csv
            biggest_gainers.csv
            biggest_losers.csv
            weekly_pages_report.csv
            weekly_pages_comparison.csv
            top_pages.csv
            page_gainers.csv
            page_losers.csv
            weekly_summary.md
