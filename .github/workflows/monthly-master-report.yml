name: Monthly SEO Master Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 1 * *" # Runs at 9:00 AM UTC on the 1st of each month

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  monthly-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Write service account key
        run: echo '${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}' > gsc-key.json

      - name: Download latest master orchestrator artifacts
        uses: actions/download-artifact@v4
        with:
          name: master-orchestrator-artifacts
          path: .
        continue-on-error: true

      - name: Run site speed monitoring (if no snapshot available)
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_ITEM_ID: ${{ secrets.MONDAY_ITEM_ID }}
        run: |
          if [ ! -f site_speed_latest_snapshot.csv ]; then
            echo "No snapshot found — running site_speed_monitoring.py"
            python -u site_speed_monitoring.py
          else
            echo "Snapshot found — skipping site_speed_monitoring.py"
          fi

      - name: Run broken link check (if no results available)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_ITEM_ID: ${{ secrets.MONDAY_BROKEN_LINK_ITEM_ID }}
        run: |
          if [ ! -f broken_link_results.csv ]; then
            echo "No broken link results found — running broken_link_check.py"
            python -u broken_link_check.py
          else
            echo "Broken link results found — skipping broken_link_check.py"
          fi

      - name: Run internal linking audit (if no results available)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_ITEM_ID: ${{ secrets.MONDAY_INTERNAL_LINK_ITEM_ID }}
        run: |
          if [ ! -f internal_linking_page_summary.csv ]; then
            echo "No internal linking data found — running internal_linking_audit.py"
            python -u internal_linking_audit.py
          else
            echo "Internal linking data found — skipping internal_linking_audit.py"
          fi

      - name: Run content audit (if no results available)
        env:
          GSC_PROPERTY: "https://www.cim.org/"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_ITEM_ID: ${{ secrets.MONDAY_CONTENT_AUDIT_ITEM_ID }}
        run: |
          if [ ! -f content_audit_candidates.csv ]; then
            echo "No content audit data found — running content_audit_schedule_report.py"
            python -u content_audit_schedule_report.py
          else
            echo "Content audit data found — skipping content_audit_schedule_report.py"
          fi

      - name: Run content category performance (if no results available)
        env:
          GSC_PROPERTY: "https://www.cim.org/"
          GA4_PROPERTY_ID: "341629008"
        run: |
          if [ ! -f content_category_performance.csv ]; then
            echo "No content category data found — running content_category_performance.py"
            python -u content_category_performance.py
          else
            echo "Content category data found — skipping content_category_performance.py"
          fi

      - name: Run Monthly Master Report
        env:
          GA4_PROPERTY_ID: "341629008"
          GSC_PROPERTY: "https://www.cim.org/"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_MONTHLY_ITEM_ID: ${{ secrets.MONDAY_MONTHLY_ITEM_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python -u monthly_master_report.py

      - name: Upload Monthly Dashboard Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monthly-dashboard-artifacts
          path: |
            monthly_dashboard.html
            monthly_data/*.csv
            charts/monthly_*.png
          retention-days: 90

      - name: Archive Monthly Dashboard
        run: |
          MONTH=$(date -d "last month" +%Y-%m)
          mkdir -p archives/$MONTH
          cp monthly_dashboard.html archives/$MONTH/
          cp -r monthly_data archives/$MONTH/
          echo "Archived dashboard for $MONTH"

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: monthly-dashboard-archive
          path: archives/
          retention-days: 365

      - name: Copy Dashboard to Root for GitHub Pages
        run: |
          # Copy the dashboard to root so it's accessible via GitHub Pages
          cp monthly_dashboard.html index.html
          echo "Dashboard copied to index.html for GitHub Pages"

  deploy:
    name: Deploy to GitHub Pages
    needs: monthly-dashboard
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Dashboard Artifacts
        uses: actions/download-artifact@v4
        with:
          name: monthly-dashboard-artifacts
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
