name: Show Service Account Details

on:
  workflow_dispatch:

jobs:
  show-details:
    runs-on: ubuntu-latest

    steps:
      - name: Write service account key
        run: echo '${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}' > gsc-key.json

      - name: Extract and Display All Service Account Details
        run: |
          echo "================================================================================"
          echo "GOOGLE CLOUD SERVICE ACCOUNT DETAILS"
          echo "================================================================================"
          echo ""
          
          # Extract all key fields
          PROJECT_ID=$(cat gsc-key.json | grep -o '"project_id"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/"project_id"[[:space:]]*:[[:space:]]*"\([^"]*\)"/\1/')
          CLIENT_EMAIL=$(cat gsc-key.json | grep -o '"client_email"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/"client_email"[[:space:]]*:[[:space:]]*"\([^"]*\)"/\1/')
          CLIENT_ID=$(cat gsc-key.json | grep -o '"client_id"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/"client_id"[[:space:]]*:[[:space:]]*"\([^"]*\)"/\1/')
          TYPE=$(cat gsc-key.json | grep -o '"type"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/"type"[[:space:]]*:[[:space:]]*"\([^"]*\)"/\1/')
          
          echo "Account Type:        $TYPE"
          echo ""
          echo "Service Account Email:"
          echo "  $CLIENT_EMAIL"
          echo ""
          echo "Google Cloud Project ID:"
          echo "  $PROJECT_ID"
          echo ""
          echo "Client ID:"
          echo "  $CLIENT_ID"
          echo ""
          echo "================================================================================"
          echo "GOOGLE CLOUD CONSOLE LINKS"
          echo "================================================================================"
          echo ""
          echo "View this project in Google Cloud Console:"
          echo "  https://console.cloud.google.com/home/dashboard?project=$PROJECT_ID"
          echo ""
          echo "View this service account:"
          echo "  https://console.cloud.google.com/iam-admin/serviceaccounts?project=$PROJECT_ID"
          echo ""
          echo "Enable Google Sheets API:"
          echo "  https://console.developers.google.com/apis/api/sheets.googleapis.com/overview?project=$PROJECT_ID"
          echo ""
          echo "View all enabled APIs:"
          echo "  https://console.cloud.google.com/apis/dashboard?project=$PROJECT_ID"
          echo ""
          echo "================================================================================"
          echo "CURRENT CONFIGURATION"
          echo "================================================================================"
          echo ""
          echo "This service account is used for:"
          echo "  • Google Search Console API access"
          echo "  • Google Analytics 4 API access"
          echo "  • Google Sheets API access (needs to be enabled)"
          echo ""
          echo "Google Sheet being accessed:"
          echo "  https://docs.google.com/spreadsheets/d/19ucIx6nVlEx6pnHyKo8ahJ158tJmo4cxAwLARNWIJZw/edit"
          echo ""
          echo "================================================================================"
          echo "NEXT STEPS"
          echo "================================================================================"
          echo ""
          echo "1. Verify this is the correct Google Cloud account"
          echo ""
          echo "2. Enable Google Sheets API (if not already enabled):"
          echo "   https://console.developers.google.com/apis/api/sheets.googleapis.com/overview?project=$PROJECT_ID"
          echo ""
          echo "3. Make sure the Google Sheet is shared with:"
          echo "   $CLIENT_EMAIL"
          echo "   (with Editor permissions)"
          echo ""
          echo "4. Test the connection:"
          echo "   gh workflow run 'Test Google Sheets Connection'"
          echo ""
          echo "================================================================================"

      - name: Clean up
        if: always()
        run: rm -f gsc-key.json
