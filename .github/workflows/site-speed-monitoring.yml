name: Site Speed Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "45 13 * * 1"

jobs:
  site-speed-monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run site speed monitoring
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_ITEM_ID: "11404492774"
        run: python -u site_speed_monitoring.py

      - name: Upload site speed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-speed-monitoring
          path: |
            tracked_speed_pages.csv
            site_speed_current_snapshot.csv
            site_speed_comparison.csv
            site_speed_latest_snapshot.csv
            site_speed_history.csv
            site_speed_summary.html
            site_speed_summary.pdf
